# See https://pre-commit.com for more information:
# How to use:
#   - install pre-commit: pip install pre-commit
#   - install hooks: pre-commit install
#   - run hooks: pre-commit run --all-files (this is what CI does)
repos:
  - repo: local
    hooks:
      - id: ruff-fix
        name: Ruff Lint Fix
        entry: uv run ruff check --fix
        language: system
        types: [ python ]
      - id: ruff-format
        name: Ruff Format
        entry: uv run ruff format .
        language: system
        types: [python]
      - id: warn-unstaged-claude
        name: Unstaged .claude/ changes
        entry: python .pre-commit-scripts/check_unstaged_claude.py
        language: system
        pass_filenames: false
        always_run: true
